# ==========================================
# M4 Pro Sanskrit D3PM Configuration
# NaN-Proof, Optimized for Safe Training
# ==========================================

model:
  # Vocabulary size for Sanskrit tokenization
  vocab_size: 16000

  # Maximum sequence length for model input
  max_seq_len: 80

  # Number of diffusion steps in the D3PM process
  diffusion_steps: 8

  # Transformer hidden dimension
  d_model: 384

  # Number of Transformer layers
  n_layers: 6

  # Number of attention heads
  n_heads: 8

  # Feed-forward layer dimension inside Transformer
  d_ff: 1536


diffusion:
  # Diffusion type used (absorbing state)
  type: "absorbing"

  # Scheduler for diffusion noise (cosine decay)
  scheduler: "cosine"

  # Token ID used as mask in absorbing diffusion
  mask_token_id: 0

  # Strength of noise applied during diffusion
  noise_strength: 0.1


training:
  # Number of samples per batch
  batch_size: 8              # Safe for M4 Pro memory

  # Total number of training epochs
  epochs: 7                   # Fast production run

  # Learning rate for optimizer
  lr: 0.0002                  # Conservative to prevent NaNs

  # Weight of KL-divergence loss (disabled to avoid NaN)
  kl_weight: 0                # Disabled

  # Label smoothing to prevent overconfidence
  label_smoothing: 0.05

  # Regularization weight for absorbing loss
  absorb_reg_weight: 0.5      # Conservative value

  # Training precision (mixed float16 for speed & memory)
  precision: "float16"

  # Device for training (Apple M4 Pro GPU)
  device: "mps"

  # Number of data loading workers (0 for M4 Pro simplicity)
  num_workers: 0